<head>
  <meta charset="UTF-8" />

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', sans-serif;
    }

    .logout-box {
      background-color: rgba(255, 255, 255, 0.98);
      padding: 3rem;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease-in-out;
    }

    .logout-box .icon {
      font-size: 4rem;
      color: #28a745;
      margin-bottom: 1.5rem;
      animation: checkmark 0.6s ease-in-out;
    }

    .logout-box h3 {
      color: #003366;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .logout-box p {
      color: #666;
      margin-bottom: 2rem;
    }

    .spinner-border {
      width: 3rem;
      height: 3rem;
      border-width: 0.3rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes checkmark {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="logout-box">
    <div class="spinner-border text-primary mb-3" role="status" id="spinner">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div id="successIcon" style="display: none;">
      <i class="bi bi-check-circle-fill icon"></i>
    </div>
    <h3 id="logoutTitle">Logging you out...</h3>
    <p id="logoutMessage">Please wait while we securely log you out.</p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';


const firebaseConfig = {
  apiKey: "AIzaSyCTRbqsXKfJ5vADuT3N_Cn_Gm7lznanFfA",
  authDomain: "oriental-photographix.firebaseapp.com",
  projectId: "oriental-photographix",
  storageBucket: "oriental-photographix.appspot.com",
  messagingSenderId: "304371179783",
  appId: "1:304371179783:web:47032045e4e84bc2f8e5a2"
};


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Perform logout immediately
    async function performLogout() {
      try {
        // Sign out from Firebase
        await signOut(auth);
        
        // Clear all session data
        sessionStorage.clear();
        localStorage.removeItem('rememberUser');
        
        // Clear all cookies
        document.cookie.split(";").forEach((c) => {
          document.cookie = c
            .replace(/^ +/, "")
            .replace(/=.*/, "=;expires=" + new Date(0).toUTCString() + ";path=/");
        });

        // Show success message
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('successIcon').style.display = 'block';
        document.getElementById('logoutTitle').textContent = "You've been logged out";
        document.getElementById('logoutMessage').textContent = "Thank you for using Oriental Photographix. Redirecting to login...";

        // Redirect to login page after 2 seconds
        setTimeout(() => {
          window.location.replace('index.html');
        }, 2000);

      } catch (error) {
        console.error('Logout error:', error);
        
        // Even if there's an error, clear local data and redirect
        sessionStorage.clear();
        localStorage.clear();
        
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('logoutTitle').textContent = "Logged out";
        document.getElementById('logoutMessage').textContent = "Redirecting to login...";
        
        setTimeout(() => {
          window.location.replace('index.html');
        }, 1500);
      }
    }

    // Execute logout immediately when page loads
    performLogout();
  </script>

</body>
</html>
