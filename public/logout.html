<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login - Oriental Photographix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url('images/new.jpeg');
      background-repeat: repeat;
      background-size: contain;
      backdrop-filter: blur(10px);
    }

    .login-box {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-header i {
      font-size: 3rem;
      color: #003366;
    }

    .brand-header h3 {
      color: #003366;
      font-weight: 700;
      margin-top: 0.5rem;
    }

    .form-text a {
      cursor: pointer;
      color: #007bff;
      text-decoration: none;
    }

    .form-text a:hover {
      text-decoration: underline;
    }

    .btn-login {
      background: linear-gradient(135deg, #003366, #004080);
      border: none;
      padding: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #004080, #003366);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,51,102,0.3);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner-border-sm {
      width: 1rem;
      height: 1rem;
      border-width: 0.15em;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="brand-header">
      <i class="bi bi-camera-fill"></i>
      <h3>ORIENTAL PHOTOGRAPHIX</h3>
      <p class="text-muted mb-0">Admin Portal</p>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          class="form-control" 
          placeholder="Enter username" 
          required 
          autocomplete="username"
        />
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-control" 
          placeholder="Enter password" 
          required 
          autocomplete="current-password"
        />
        <div class="form-text text-end">
          <a onclick="togglePassword()">
            <i class="bi bi-eye" id="toggleIcon"></i> <span id="toggleText">Show</span>
          </a>
        </div>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
          <span id="loginBtnText">Login</span>
          <span id="loginSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;"></span>
        </button>
      </div>
    </form>

    <div class="text-center mt-4">
      <small class="text-muted">
        <i class="bi bi-shield-check"></i> Secure Login
      </small>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>

  <script>
    // Check if already logged in
    if (isAuthenticated()) {
      window.location.href = 'admin.html';
    }

    function togglePassword() {
      const passInput = document.getElementById("password");
      const toggleIcon = document.getElementById("toggleIcon");
      const toggleText = document.getElementById("toggleText");
      
      if (passInput.type === "password") {
        passInput.type = "text";
        toggleIcon.className = "bi bi-eye-slash";
        toggleText.textContent = "Hide";
      } else {
        passInput.type = "password";
        toggleIcon.className = "bi bi-eye";
        toggleText.textContent = "Show";
      }
    }

    async function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const loginBtn = document.getElementById("loginBtn");
      const loginBtnText = document.getElementById("loginBtnText");
      const loginSpinner = document.getElementById("loginSpinner");

      // Disable button and show loading
      loginBtn.disabled = true;
      loginBtnText.textContent = "Logging in...";
      loginSpinner.style.display = "inline-block";

      try {
        const response = await api.login(username, password);

        if (response.success) {
          showAlert('Login successful! Redirecting...', 'success');
          
          // Redirect after short delay
          setTimeout(() => {
            window.location.href = 'admin.html';
          }, 1000);
        }
      } catch (error) {
        showAlert(error.message || 'Invalid username or password', 'danger');
        
        // Re-enable button
        loginBtn.disabled = false;
        loginBtnText.textContent = "Login";
        loginSpinner.style.display = "none";
      }
    }

    // Enter key support
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    });
  </script>

</body>
</html>
